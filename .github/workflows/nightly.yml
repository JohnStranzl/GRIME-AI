name: GRIME AI Nightly Build

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:      # allows manual trigger from GitHub UI

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate: true
          activate-environment: base
          miniconda-version: "latest"

      - name: Set nightly version
        run: |
          DATE=$(date +%Y%m%d)
          BASE=$(sed -n 's/.*{%.*set version.*=.*"\(.*\)".*/\1/p' recipe/grime-ai/meta.yaml)
          echo "NIGHTLY_VERSION=${BASE}.dev${DATE}" >> $GITHUB_ENV

      - name: Patch meta.yaml version
        run: |
          sed -i "s/{% set version = \".*\" %}/{% set version = \"$NIGHTLY_VERSION\" %}/" \
            recipe/grime-ai/meta.yaml

      - name: Build and upload to dev label
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          conda install conda-build anaconda-client -y
          conda build recipe/grime-ai/
          anaconda -t $ANACONDA_API_TOKEN upload \
            $(conda build recipe/grime-ai/ --output) \
            --user GRIMELab \
            --label dev \
            --force
